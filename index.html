<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT Lookup — Identity Search</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f; --surface: #111118; --surface2: #16161f;
            --border: #1e1e2e; --border2: #2a2a3e;
            --accent: #6366f1; --accent2: #818cf8;
            --green: #22c55e; --green-bg: #22c55e14;
            --yellow: #f59e0b; --yellow-bg: #f59e0b14;
            --red: #ef4444; --red-bg: #ef444414;
            --gray: #6b7280; --gray2: #9ca3af; --text: #f3f4f6; --text2: #d1d5db; --text3: #9ca3af;
            --mono: 'JetBrains Mono', monospace; --font: 'Inter', -apple-system, sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; padding: 1.5rem 1rem 4rem; }
        .container { max-width: 860px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 2.5rem; padding-top: 1rem; }
        header h1 { font-size: 1.75rem; font-weight: 700; color: #fff; letter-spacing: -0.5px; margin-bottom: 0.4rem; }
        header p { color: var(--text3); font-size: 0.9rem; }

        .search-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .type-row { display: flex; gap: 0.4rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .type-btn { flex: 1; min-width: 80px; padding: 0.55rem 0.5rem; border: 1px solid var(--border2); border-radius: 10px; background: transparent; color: var(--text3); cursor: pointer; font-size: 0.82rem; font-family: var(--font); font-weight: 500; transition: all 0.15s; text-align: center; }
        .type-btn:hover { border-color: var(--accent); color: var(--text2); }
        .type-btn.active { border-color: var(--accent); background: #6366f118; color: var(--accent2); }
        .search-row { display: flex; gap: 0.75rem; }
        #query-input { flex: 1; padding: 0.85rem 1rem; border: 1px solid var(--border2); border-radius: 12px; background: var(--bg); color: var(--text); font-size: 0.95rem; font-family: var(--font); outline: none; transition: border-color 0.15s; }
        #query-input:focus { border-color: var(--accent); }
        #query-input::placeholder { color: var(--gray); }
        #search-btn { padding: 0.85rem 1.8rem; border: none; border-radius: 12px; background: var(--accent); color: #fff; font-size: 0.95rem; font-weight: 600; font-family: var(--font); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
        #search-btn:hover { background: #4f46e5; }
        #search-btn:disabled { background: var(--gray); cursor: not-allowed; }
        .hint-row { display: flex; justify-content: space-between; align-items: center; margin-top: 0.75rem; }
        .hint { font-size: 0.78rem; color: var(--gray); }
        .auto-badge { font-size: 0.7rem; background: var(--accent); color: #fff; padding: 0.15rem 0.5rem; border-radius: 20px; display: none; }

        .loading { display: none; text-align: center; padding: 2.5rem 1rem; }
        .loading.visible { display: block; }
        .spinner { width: 36px; height: 36px; border: 3px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading p { color: var(--text3); font-size: 0.9rem; }

        .error-box { display: none; background: var(--red-bg); border: 1px solid #ef444430; border-radius: 12px; padding: 1rem 1.25rem; color: #f87171; font-size: 0.9rem; margin-bottom: 1rem; }
        .error-box.visible { display: block; }

        .results { display: none; }
        .results.visible { display: block; }

        .summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; }
        .summary-card .summary-text { font-size: 0.95rem; color: var(--text2); line-height: 1.6; margin-bottom: 1rem; }
        .summary-meta { display: flex; gap: 1rem; flex-wrap: wrap; }
        .meta-pill { display: flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; color: var(--text3); background: var(--surface2); padding: 0.3rem 0.75rem; border-radius: 20px; border: 1px solid var(--border); }
        .meta-pill .dot { width: 6px; height: 6px; border-radius: 50%; }
        .meta-pill .dot.green { background: var(--green); }
        .meta-pill .dot.yellow { background: var(--yellow); }
        .meta-pill .dot.red { background: var(--red); }
        .meta-pill .dot.gray { background: var(--gray); }

        .section-title { font-size: 0.75rem; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; }

        .identity-graph { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; overflow-x: auto; }
        .graph-scroll { display: flex; gap: 0.5rem; align-items: center; min-width: min-content; padding-bottom: 0.5rem; }
        .graph-node { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; min-width: 90px; }
        .graph-node-circle { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; border: 2px solid var(--border2); background: var(--surface2); }
        .graph-node-circle.email { border-color: #3b82f6; background: #3b82f614; }
        .graph-node-circle.username { border-color: #8b5cf6; background: #8b5cf614; }
        .graph-node-circle.phone { border-color: #10b981; background: #10b98114; }
        .graph-node-circle.account { border-color: var(--accent); background: #6366f114; }
        .graph-node-circle.input { border-color: var(--yellow); background: #f59e0b14; }
        .graph-node-label { font-size: 0.7rem; color: var(--text3); text-align: center; max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .graph-arrow { color: var(--gray); font-size: 1.2rem; flex-shrink: 0; }

        .cross-links { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; }
        .cross-link-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .cross-link-item:last-child { border-bottom: none; }
        .cl-from { background: #6366f118; color: var(--accent2); padding: 0.2rem 0.6rem; border-radius: 6px; font-family: var(--mono); font-size: 0.78rem; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .cl-arrow { color: var(--gray); font-size: 0.8rem; }
        .cl-to { background: #22c55e14; color: #4ade80; padding: 0.2rem 0.6rem; border-radius: 6px; font-family: var(--mono); font-size: 0.78rem; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .cl-reason { color: var(--text3); font-size: 0.78rem; margin-left: auto; text-align: right; max-width: 200px; }

        .tabs { display: flex; gap: 0.25rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); overflow-x: auto; }
        .tab-btn { padding: 0.6rem 1rem; border: none; background: transparent; color: var(--text3); cursor: pointer; font-size: 0.85rem; font-family: var(--font); font-weight: 500; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; white-space: nowrap; }
        .tab-btn:hover { color: var(--text2); }
        .tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent); }
        .tab-count { display: inline-flex; align-items: center; justify-content: center; background: var(--surface2); color: var(--text3); font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 10px; margin-left: 0.35rem; min-width: 20px; }
        .tab-btn.active .tab-count { background: #6366f130; color: var(--accent2); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 0.6rem; transition: border-color 0.15s; }
        .result-card:hover { border-color: var(--border2); }
        .result-card.found { border-left: 3px solid var(--green); }
        .result-card.not_found { border-left: 3px solid var(--border2); opacity: 0.6; }
        .result-card.rate_limited { border-left: 3px solid var(--yellow); }
        .result-card.error, .result-card.unknown { border-left: 3px solid var(--red); }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.75rem; }
        .card-info { flex: 1; }
        .card-title { font-weight: 600; color: var(--text); font-size: 0.95rem; margin-bottom: 0.2rem; }
        a.card-title { color: var(--accent2); text-decoration: none; }
        a.card-title:hover { text-decoration: underline; }
        .card-detail { font-size: 0.82rem; color: var(--text3); line-height: 1.5; }
        .card-tags { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-top: 0.6rem; }
        .tag { font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 4px; font-family: var(--mono); }
        .tag.github { background: #24292e20; color: #e0e0e0; }
        .tag.breach { background: #ef444418; color: #f87171; }
        .tag.platform { background: #10b98118; color: #34d399; }
        .tag.profile { background: #8b5cf618; color: #a78bfa; }
        .tag.domain { background: #3b82f618; color: #60a5fa; }
        .tag.phone { background: #10b98118; color: #34d399; }
        .tag.avatar { background: #ec489918; color: #f472b6; }
        .tag.disposable { background: #f59e0b18; color: #fbbf24; }
        .tag.warning { background: #f59e0b18; color: #fbbf24; }
        .tag.account { background: #6366f118; color: var(--accent2); }
        .card-status { font-size: 0.72rem; padding: 0.2rem 0.6rem; border-radius: 20px; font-weight: 500; flex-shrink: 0; }
        .card-status.found { background: var(--green-bg); color: var(--green); }
        .card-status.not_found { background: var(--surface2); color: var(--gray); }
        .card-status.rate_limited { background: var(--yellow-bg); color: var(--yellow); }
        .card-status.error, .card-status.unknown { background: var(--red-bg); color: var(--red); }

        .empty-state { text-align: center; padding: 2rem; color: var(--gray); font-size: 0.9rem; }

        .platform-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.5rem; }
        .platform-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem 1rem; display: flex; align-items: center; gap: 0.6rem; }
        .platform-card.found { border-color: var(--green); background: var(--green-bg); }
        .platform-icon { font-size: 1.1rem; }
        .platform-info { flex: 1; min-width: 0; }
        .platform-name { font-size: 0.85rem; font-weight: 500; color: var(--text2); }
        .platform-user { font-size: 0.75rem; color: var(--text3); font-family: var(--mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .platform-status { font-size: 0.7rem; color: var(--green); text-decoration: none; }
        .platform-status:hover { text-decoration: underline; }

        .phone-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.5rem; }
        .phone-detail { background: var(--surface2); padding: 0.6rem 0.85rem; border-radius: 8px; border: 1px solid var(--border); }
        .phone-detail-key { font-size: 0.68rem; color: var(--gray); text-transform: uppercase; letter-spacing: 0.05em; }
        .phone-detail-val { font-size: 0.88rem; color: var(--text2); font-family: var(--mono); margin-top: 0.15rem; }

        footer { text-align: center; margin-top: 3rem; color: #333; font-size: 0.72rem; }

        @media (max-width: 480px) {
            .search-row { flex-direction: column; }
            #search-btn { width: 100%; }
            .cl-reason { display: none; }
            .phone-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🔍 OSINT Lookup</h1>
        <p>Search any email, username, or phone — find everything connected to it</p>
    </header>

    <div class="search-box">
        <div class="type-row">
            <button class="type-btn active" data-type="auto"><span>🔍</span> Auto</button>
            <button class="type-btn" data-type="username"><span>👤</span> Username</button>
            <button class="type-btn" data-type="email"><span>📧</span> Email</button>
            <button class="type-btn" data-type="phone"><span>📱</span> Phone</button>
        </div>
        <div class="search-row">
            <input type="text" id="query-input" placeholder="Enter an email, username, or phone...">
            <button id="search-btn">Search</button>
        </div>
        <div class="hint-row">
            <span class="hint" id="hint-text">Auto-detects input type</span>
            <span class="auto-badge" id="auto-badge">Auto</span>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Searching across 20+ sources...</p>
    </div>

    <div class="error-box" id="error-box"></div>

    <div class="results" id="results">
        <div class="summary-card" id="summary-card">
            <p class="summary-text" id="summary-text"></p>
            <div class="summary-meta" id="summary-meta"></div>
        </div>

        <div class="identity-graph" id="identity-graph-section">
            <div class="section-title">Identity Graph</div>
            <div class="graph-scroll" id="identity-graph"></div>
        </div>

        <div class="cross-links" id="cross-links-section">
            <div class="section-title">Cross-Links</div>
            <div id="cross-links-list"></div>
        </div>

        <div class="tabs" id="tabs">
            <button class="tab-btn active" data-tab="accounts">Accounts <span class="tab-count" id="count-accounts">0</span></button>
            <button class="tab-btn" data-tab="emails">Emails <span class="tab-count" id="count-emails">0</span></button>
            <button class="tab-btn" data-tab="usernames">Usernames <span class="tab-count" id="count-usernames">0</span></button>
            <button class="tab-btn" data-tab="phones">Phones <span class="tab-count" id="count-phones">0</span></button>
            <button class="tab-btn" data-tab="raw">All Checks <span class="tab-count" id="count-raw">0</span></button>
        </div>

        <div class="tab-panel active" id="panel-accounts"></div>
        <div class="tab-panel" id="panel-emails"></div>
        <div class="tab-panel" id="panel-usernames"></div>
        <div class="tab-panel" id="panel-phones"></div>
        <div class="tab-panel" id="panel-raw"></div>
    </div>

    <footer>OSINT Tool v5 — for authorized research use only</footer>
</div>

<script>
const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:8000'
    : 'https://osint-tool-c2np.onrender.com';

let currentType = 'auto';

document.querySelectorAll('.type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentType = btn.dataset.type;
        document.getElementById('auto-badge').style.display = currentType === 'auto' ? 'inline' : 'none';
        document.getElementById('query-input').placeholder =
            currentType === 'username' ? 'Enter a username...' :
            currentType === 'email' ? 'Enter an email address...' :
            currentType === 'phone' ? 'Enter a phone number (with +country code)...' :
            'Enter an email, username, or phone...';
    });
});

document.getElementById('search-btn').addEventListener('click', doLookup);
document.getElementById('query-input').addEventListener('keypress', e => {
    if (e.key === 'Enter') doLookup();
});

document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    });
});

async function doLookup() {
    const query = document.getElementById('query-input').value.trim();
    if (!query) return;
    const btn = document.getElementById('search-btn');
    const loading = document.getElementById('loading');
    const results = document.getElementById('results');
    const errorBox = document.getElementById('error-box');
    btn.disabled = true;
    btn.textContent = 'Searching...';
    loading.classList.add('visible');
    results.classList.remove('visible');
    errorBox.classList.remove('visible');
    try {
        const resp = await fetch(API_URL + '/lookup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query, lookup_type: currentType })
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || 'Lookup failed');
        displayResults(data);
    } catch (err) {
        errorBox.textContent = err.message || 'Something went wrong';
        errorBox.classList.add('visible');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Search';
        loading.classList.remove('visible');
    }
}

function displayResults(data) {
    const results = document.getElementById('results');
    results.classList.add('visible');
    document.getElementById('summary-text').textContent = data.summary;
    const conf = data.confidence || 'low';
    const dotColor = conf === 'high' ? 'green' : conf === 'medium' ? 'yellow' : 'red';
    document.getElementById('summary-meta').innerHTML = `
        <div class="meta-pill"><span class="dot ${dotColor}"></span> Confidence: ${conf}</div>
        <div class="meta-pill"><span class="dot gray"></span> Type: ${data.detected_type}</div>
        <div class="meta-pill"><span class="dot gray"></span> Query: ${escHtml(data.query)}</div>
    `;
    buildIdentityGraph(data);
    buildCrossLinks(data.cross_references || []);
    const e = data.entities || {};
    document.getElementById('count-accounts').textContent = (e.accounts || []).length;
    document.getElementById('count-emails').textContent = (e.emails || []).length;
    document.getElementById('count-usernames').textContent = (e.usernames || []).length;
    document.getElementById('count-phones').textContent = (e.phones || []).length;
    document.getElementById('count-raw').textContent = (data.raw_results || []).length;
    buildAccountsTab(e);
    buildEmailsTab(e);
    buildUsernamesTab(e);
    buildPhonesTab(e);
    buildRawTab(data.raw_results || []);
}

function buildIdentityGraph(data) {
    const section = document.getElementById('identity-graph-section');
    const graph = document.getElementById('identity-graph');
    const e = data.entities || {};
    const nodes = [];
    const q = data.query || '';
    const type = data.detected_type || 'username';
    const icon = type === 'email' ? '📧' : type === 'phone' ? '📱' : '👤';
    nodes.push(`<div class="graph-node"><div class="graph-node-circle input">${icon}</div><div class="graph-node-label">${trunc(q, 14)}</div></div>`);
    (e.accounts || []).slice(0, 5).forEach(a => {
        nodes.push(`<span class="graph-arrow">→</span><div class="graph-node"><div class="graph-node-circle account">${pIcon(a.platform)}</div><div class="graph-node-label">${a.platform}</div></div>`);
    });
    (e.emails || []).filter(em => em.value !== q).slice(0, 2).forEach(em => {
        nodes.push(`<span class="graph-arrow">→</span><div class="graph-node"><div class="graph-node-circle email">📧</div><div class="graph-node-label">${trunc(em.value.split('@')[0], 10)}</div></div>`);
    });
    (e.usernames || []).filter(u => u.value !== q).slice(0, 2).forEach(u => {
        nodes.push(`<span class="graph-arrow">→</span><div class="graph-node"><div class="graph-node-circle username">👤</div><div class="graph-node-label">${trunc(u.value, 10)}</div></div>`);
    });
    if (nodes.length <= 1) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    graph.innerHTML = nodes.join('');
}

function buildCrossLinks(crossRefs) {
    const section = document.getElementById('cross-links-section');
    const list = document.getElementById('cross-links-list');
    if (!crossRefs || crossRefs.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = crossRefs.map(cl => `
        <div class="cross-link-item">
            <span class="cl-from">${trunc(cl.from, 18)}</span>
            <span class="cl-arrow">↔</span>
            <span class="cl-to">${trunc(cl.to, 18)}</span>
            <span class="cl-reason">${cl.reason || ''}</span>
        </div>`).join('');
}

function buildAccountsTab(e) {
    const panel = document.getElementById('panel-accounts');
    const accounts = e.accounts || [];
    if (!accounts.length) { panel.innerHTML = '<div class="empty-state">No accounts found</div>'; return; }
    panel.innerHTML = `<div class="platform-grid">${accounts.map(a => `
        <div class="platform-card found">
            <span class="platform-icon">${pIcon(a.platform)}</span>
            <div class="platform-info">
                <div class="platform-name">${a.platform}</div>
                <div class="platform-user">@${a.username || a.value || '?'}</div>
            </div>
            ${a.url ? `<a href="${a.url}" target="_blank" class="platform-status found">↗</a>` : ''}
        </div>`).join('')}</div>`;
}

function buildEmailsTab(e) {
    const panel = document.getElementById('panel-emails');
    const emails = e.emails || [];
    if (!emails.length) { panel.innerHTML = '<div class="empty-state">No emails found</div>'; return; }
    panel.innerHTML = emails.map(em => {
        const tags = [];
        if (em.disposable) tags.push('<span class="tag disposable">⚠ Disposable</span>');
        if (em.breach_count) tags.push(`<span class="tag breach">⚠ ${em.breach_count} breach(es)</span>`);
        if (em.source) tags.push(`<span class="tag domain">via ${em.source}</span>`);
        if (em.domain) tags.push(`<span class="tag domain">${em.domain}</span>`);
        const details = [];
        if (em.breach_count) details.push(`Found in ${em.breach_count} breach(es)`);
        if (em.source) details.push(`Source: ${em.source}`);
        return `<div class="result-card found">
            <div class="card-top">
                <div class="card-info">
                    <div class="card-title">📧 ${escHtml(em.value)}</div>
                    ${details.length ? `<div class="card-detail">${details.join(' · ')}</div>` : ''}
                    ${tags.length ? `<div class="card-tags">${tags.join('')}</div>` : ''}
                </div>
                <span class="card-status found">✓ Found</span>
            </div>
        </div>`;
    }).join('');
}

function buildUsernamesTab(e) {
    const panel = document.getElementById('panel-usernames');
    const usernames = e.usernames || [];
    if (!usernames.length) { panel.innerHTML = '<div class="empty-state">No usernames found</div>'; return; }
    panel.innerHTML = usernames.map(u => {
        const tags = [];
        if (u.source) tags.push(`<span class="tag account">via ${u.source}</span>`);
        if (u.platform && u.platform !== 'input') tags.push(`<span class="tag platform">${u.platform}</span>`);
        const title = u.url
            ? `<a href="${u.url}" target="_blank" class="card-title">👤 ${escHtml(u.value)} ↗</a>`
            : `👤 ${escHtml(u.value)}`;
        let detail = u.bio || '';
        if (u.location) detail += (detail ? ' · ' : '') + `📍 ${u.location}`;
        return `<div class="result-card found">
            <div class="card-top">
                <div class="card-info">
                    <div class="card-title">${title}</div>
                    ${detail ? `<div class="card-detail">${escHtml(detail)}</div>` : ''}
                    ${tags.length ? `<div class="card-tags">${tags.join('')}</div>` : ''}
                </div>
                <span class="card-status found">✓ Found</span>
            </div>
        </div>`;
    }).join('');
}

function buildPhonesTab(e) {
    const panel = document.getElementById('panel-phones');
    const phones = e.phones || [];
    if (!phones.length) { panel.innerHTML = '<div class="empty-state">No phone records found</div>'; return; }
    panel.innerHTML = phones.map(p => {
        const items = [];
        if (p.national) items.push({ k: 'National', v: p.national });
        if (p.international) items.push({ k: 'International', v: p.international });
        if (p.e164) items.push({ k: 'E164', v: p.e164 });
        if (p.carrier) items.push({ k: 'Carrier', v: p.carrier });
        if (p.country) items.push({ k: 'Country', v: p.country });
        if (p.geocoder) items.push({ k: 'Location', v: p.geocoder });
        if (p.timezones && p.timezones.length) items.push({ k: 'Timezone', v: p.timezones[0] });
        const grid = items.map(it => `<div class="phone-detail"><div class="phone-detail-key">${it.k}</div><div class="phone-detail-val">${escHtml(it.v)}</div></div>`).join('');
        const tags = [];
        if (!p.valid) tags.push('<span class="tag warning">⚠ Invalid</span>');
        if (p.source) tags.push(`<span class="tag phone">via ${p.source}</span>`);
        return `<div class="result-card ${p.valid ? 'found' : 'error'}">
            <div class="card-top">
                <div class="card-info">
                    <div class="card-title">📱 ${escHtml(p.value)}</div>
                    <div class="phone-grid" style="margin-top:0.75rem">${grid}</div>
                    ${tags.length ? `<div class="card-tags">${tags.join('')}</div>` : ''}
                </div>
                <span class="card-status ${p.valid ? 'found' : 'error'}">${p.valid ? '✓ Valid' : '✗ Invalid'}</span>
            </div>
        </div>`;
    }).join('');
}

function buildRawTab(raw) {
    const panel = document.getElementById('panel-raw');
    if (!raw || raw.length === 0) { panel.innerHTML = '<div class="empty-state">No raw results</div>'; return; }
    panel.innerHTML = raw.map(r => {
        const tags = (r.tags || []).map(t => `<span class="tag ${t}">${t}</span>`).join('');
        const title = r.url
            ? `<a href="${r.url}" target="_blank" class="card-title">${escHtml(r.title)} ↗</a>`
            : escHtml(r.title);
        return `<div class="result-card ${r.status}">
            <div class="card-top">
                <div class="card-info">
                    <div class="card-title">${title}</div>
                    ${r.detail ? `<div class="card-detail">${escHtml(r.detail)}</div>` : ''}
                    ${tags ? `<div class="card-tags">${tags}</div>` : ''}
                </div>
                <span class="card-status ${r.status}">${statusLabel(r.status)}</span>
            </div>
        </div>`;
    }).join('');
}

function statusLabel(s) {
    return { found: '✓ Found', not_found: '— Not Found', rate_limited: '⚠ Rate Limited', error: '✗ Error', unknown: '?' }[s] || s;
}

function pIcon(platform) {
    const icons = {
        Twitter: '🐦', Instagram: '📸', Reddit: '🤖', TikTok: '🎵', YouTube: '▶️',
        Telegram: '✈️', GitLab: '🦊', LinkedIn: '💼', Pinterest: '📌', Medium: '📝',
        Steam: '🎮', Spotify: '🎧', GitHub: '🐙', Threads: '🧵', Mastodon: '🐘',
        Gravatar: '👤',
    };
    return icons[platform] || '🌐';
}

function trunc(s, len) {
    if (!s) return '';
    s = String(s);
    return s.length > len ? s.slice(0, len) + '…' : s;
}

function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
